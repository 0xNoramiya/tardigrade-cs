# Chaos VM #1 — "break primary LLM".
# Priority-0 target is a pre-broken Anthropic integration (configured at the
# provider-account level with an invalid API key). When the chaos engine
# swaps the agent model to this VM, the gateway:
#   - hits the broken primary, gets a real 401
#   - retries per retry_config
#   - falls back to openai-gpt-4o-mini
#
# This produces real provider failures in the observability tab — not faked
# by the application layer.
name: tardigrade-chaos-primary
type: provider-account/virtual-model
collaborators:
  - role_id: provider-account-manager
    subject: user:rhaikal91@gmail.com
  - role_id: provider-account-access
    subject: team:everyone
integrations:
  - name: tardigrade-chaos-primary
    type: integration/model/virtual
    model_types: [chat]
    routing_config:
      type: priority-based-routing
      load_balance_targets:
        # Broken anthropic integration — invalid API key on the provider account.
        - target: anthropic-broken/claude-sonnet-4-6
          priority: 0
          fallback_candidate: true
          fallback_status_codes: ["401", "403", "404", "408", "429", "500", "502", "503", "504"]
          retry_config:
            attempts: 1
            delay: 50
            on_status_codes: ["429", "500", "502", "503", "504"]
        - target: openai/gpt-4o-mini
          priority: 1
          fallback_candidate: true
          fallback_status_codes: ["401", "403", "404", "408", "429", "500", "502", "503", "504"]
          retry_config:
            attempts: 2
            delay: 100
            on_status_codes: ["429", "500", "502", "503", "504"]
        - target: google-gemini/gemini-2.5-flash-lite
          priority: 2
          fallback_candidate: true
          retry_config:
            attempts: 1
            delay: 100
