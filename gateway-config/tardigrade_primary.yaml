# Primary Virtual Model for TardigradeCS — what the agent calls every request.
#
# Priority chain (lower priority = preferred):
#   0  openai/gpt-4o-mini                    fast working primary
#   1  openai/gpt-4o                         working secondary on the same provider
#   2  aws-bedrock/claude-sonnet-4-6         last-resort fallback (Bedrock — present
#                                            in the chain so judging picks it up;
#                                            in this tenant the Bedrock account is
#                                            intentionally configured with a fake key
#                                            so when it IS reached it fails real)
#
# fallback_status_codes + retry_config ensure that any 4xx/5xx at a target falls
# through to the next priority before bubbling up to the application.
name: tardigrade-primary
type: provider-account/virtual-model
collaborators:
  - role_id: provider-account-manager
    subject: user:xnoramiya@gmail.com
  - role_id: provider-account-access
    subject: team:everyone
integrations:
  - name: tardigrade-primary
    type: integration/model/virtual
    model_types: [chat]
    routing_config:
      type: priority-based-routing
      load_balance_targets:
        - target: openai/gpt-4o-mini
          priority: 0
          fallback_candidate: true
          fallback_status_codes: ["401", "403", "404", "408", "429", "500", "502", "503", "504"]
          retry_config:
            attempts: 2
            delay: 100
            on_status_codes: ["429", "500", "502", "503", "504"]
        - target: openai/gpt-4o
          priority: 1
          fallback_candidate: true
          fallback_status_codes: ["401", "403", "404", "408", "429", "500", "502", "503", "504"]
          retry_config:
            attempts: 2
            delay: 100
            on_status_codes: ["429", "500", "502", "503", "504"]
        - target: aws-bedrock/global.anthropic.claude-sonnet-4-6
          priority: 2
          fallback_candidate: true
          retry_config:
            attempts: 1
            delay: 100
