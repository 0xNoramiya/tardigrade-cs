# Primary Virtual Model for TardigradeCS.
#
# Priority chain (lower = preferred):
#   0  anthropic claude-sonnet-4-6      tool-calling is strongest here
#   1  bedrock anthropic claude-3-5-sonnet   AWS Bedrock once access lands
#   2  openai gpt-4o-mini                cheap reliable fallback
#   3  google-gemini gemini-2.5-flash-lite   last-ditch alt provider
#
# fallback_status_codes / retry_config make TF's gateway exercise the chain
# on any infrastructure-class failure (401/403/429/5xx) before bubbling up.
#
# Until Bedrock model-access lands, comment out the bedrock target. The
# chain still has three independent providers so the resilience story holds.
name: tardigrade-primary
type: provider-account/virtual-model
collaborators:
  - role_id: provider-account-manager
    subject: user:rhaikal91@gmail.com
  - role_id: provider-account-access
    subject: team:everyone
integrations:
  - name: tardigrade-primary
    type: integration/model/virtual
    model_types: [chat]
    routing_config:
      type: priority-based-routing
      load_balance_targets:
        - target: anthropic/claude-sonnet-4-6
          priority: 0
          fallback_candidate: true
          fallback_status_codes: ["401", "403", "404", "408", "429", "500", "502", "503", "504"]
          retry_config:
            attempts: 2
            delay: 100
            on_status_codes: ["429", "500", "502", "503", "504"]
        # Add once AWS Bedrock model-access for Claude 3.5 Sonnet is approved:
        # - target: aws-bedrock/anthropic.claude-3-5-sonnet-20241022-v2:0
        #   priority: 1
        #   fallback_candidate: true
        #   fallback_status_codes: ["401", "403", "404", "408", "429", "500", "502", "503", "504"]
        #   retry_config:
        #     attempts: 2
        #     delay: 100
        #     on_status_codes: ["429", "500", "502", "503", "504"]
        - target: openai/gpt-4o-mini
          priority: 2
          fallback_candidate: true
          fallback_status_codes: ["401", "403", "404", "408", "429", "500", "502", "503", "504"]
          retry_config:
            attempts: 2
            delay: 100
            on_status_codes: ["429", "500", "502", "503", "504"]
        - target: google-gemini/gemini-2.5-flash-lite
          priority: 3
          fallback_candidate: true
          retry_config:
            attempts: 1
            delay: 100
